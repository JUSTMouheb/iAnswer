services:

  db:
    image: postgres
    restart: always
    volumes: 
      - ianswer-pgdata:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: iAnswer
    ports:
      - 5432:5432
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
volumes:
  ianswer-pgdata: